<!-- index.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Adega 24h Delivery</title>

  <link rel="stylesheet" href="styles.css"/>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
</head>

<body>

  <header class="topo">
    <div class="logo">
      🍷 Adega 24h Delivery
    </div>

    <button class="cart-btn" onclick="toggleCart()">
      <i class="fa-solid fa-cart-shopping"></i>
      <span id="cart-count">0</span>
    </button>
  </header>

  <section class="hero">
    <div class="overlay">
      <h1>Bebidas Geladas 24 Horas</h1>
      <p>Entrega rápida • Promoções exclusivas • Adega Premium</p>

      <button onclick="scrollToMenu()">
        VER CARDÁPIO
      </button>
    </div>
  </section>

  <section class="categories">
    <button>Whisky</button>
    <button>Vodka</button>
    <button>Gin</button>
    <button>Cerveja</button>
    <button>Combo</button>
    <button>Energético</button>
  </section>

  <main id="menu" class="menu-container"></main>

  <!-- Carrinho -->
  <aside id="cart" class="cart">

    <div class="cart-header">
      <h2>Seu Pedido</h2>

      <button onclick="toggleCart()">
        ✕
      </button>
    </div>

    <div id="cart-items"></div>

    <div class="cart-footer">
      <h3>Total: R$ <span id="cart-total">0.00</span></h3>

      <button class="checkout-btn" onclick="checkoutWhatsApp()">
        Finalizar Pedido
      </button>

      <button class="clear-btn" onclick="clearCart()">
        Esvaziar Carrinho
      </button>
    </div>

  </aside>

  <!-- WhatsApp -->
  <a
    href="https://wa.me/5511999999999"
    class="whatsapp"
    target="_blank"
  >
    <i class="fa-brands fa-whatsapp"></i>
  </a>

  <script src="script.js"></script>

</body>
</html>
