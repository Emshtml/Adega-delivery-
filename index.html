<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Top - Peça Agora</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Ícones opcionais (FontAwesome) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <div class="header-container">
            <h1><i class="fas fa-utensils"></i> Delivery Top</h1>
            <p>O sabor que vai até você!</p>
        </div>
    </header>

    <main class="container">
        <!-- Seção de Produtos -->
        <section class="products-section">
            <h2>Nosso Cardápio</h2>
            <div id="products-grid" class="products-grid">
                <!-- Carregado via JavaScript -->
            </div>
        </section>

        <!-- Seção do Carrinho e Finalização -->
        <aside class="cart-section">
            <h2><i class="fas fa-shopping-cart"></i> Seu Carrinho</h2>
            <div id="cart-items" class="cart-items">
                <p class="empty-cart">Seu carrinho está vazio.</p>
            </div>

            <div class="cart-total">
                <h3>Total: <span id="cart-total-value">R$ 0,00</span></h3>
            </div>

            <!-- Formulário de Entrega -->
            <form id="delivery-form" class="delivery-form">
                <h3>Dados de Entrega</h3>
                <div class="form-group">
                    <label for="name">Nome:</label>
                    <input type="text" id="name" required placeholder="Seu nome completo">
                </div>
                <div class="form-group">
                    <label for="address">Endereço:</label>
                    <input type="text" id="address" required placeholder="Rua, número, bairro">
                </div>
                <div class="form-group">
                    <label for="payment">Forma de Pagamento:</label>
                    <select id="payment" required>
                        <option value="">Selecione...</option>
                        <option value="Dinheiro">Dinheiro</option>
                        <option value="Cartão de Crédito">Cartão de Crédito</option>
                        <option value="Cartão de Débito">Cartão de Débito</option>
                        <option value="Pix">Pix</option>
                    </select>
                </div>
                <button type="submit" class="btn-submit" id="btn-finish">
                    <i class="fab fa-whatsapp"></i> Enviar Pedido via WhatsApp
                </button>
            </form>
        </aside>
    </main>

    <!-- Scripts -->
    <script src="delivery.js"></script>
    <script src="script.js"></script>
</body>
</html>
